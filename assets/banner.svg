<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mert Efe Kurt - Software Developer</title>
  <desc id="desc">Professional GitHub profile banner for Mert Efe Kurt, focused on Python, automation, data quality, and backend systems.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0A1626"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>

    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(288 92) rotate(30) scale(420 210)">
      <stop stop-color="#38BDF8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rightGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(946 240) rotate(156) scale(380 220)">
      <stop stop-color="#22C55E" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="92" y1="284" x2="584" y2="284" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>

    <linearGradient id="card" x1="696" y1="62" x2="1088" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111C2E" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0.92"/>
    </linearGradient>

    <linearGradient id="cardEdge" x1="696" y1="62" x2="1088" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE" stop-opacity="0.22"/>
      <stop offset="0.52" stop-color="#60A5FA" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.2"/>
    </linearGradient>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#F8FAFC" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#background)"/>
  <rect width="1200" height="360" fill="url(#leftGlow)"/>
  <rect width="1200" height="360" fill="url(#rightGlow)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <path d="M88 286C184 240 286 235 386 272C500 314 606 304 724 246C838 190 958 186 1108 238" stroke="#7DD3FC" stroke-opacity="0.14" stroke-width="2"/>
  <path d="M92 284H584" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(92 68)">
    <rect x="0" y="0" width="198" height="36" rx="18" fill="#07111F" stroke="#E2E8F0" stroke-opacity="0.16"/>
    <circle cx="20" cy="18" r="5.5" fill="#22C55E"/>
    <text x="38" y="23" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.7">SOFTWARE DEVELOPER</text>
  </g>

  <text x="92" y="170" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="800" letter-spacing="0">
    Mert Efe Kurt
  </text>

  <text x="96" y="220" fill="#D7DEE9" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="500" letter-spacing="0">
