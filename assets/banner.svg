<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mert Efe Kurt — Software Developer</title>
  <desc id="desc">Profile banner for Mert Efe Kurt, focused on reliable tooling for AI systems.</desc>

  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="1160" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0B1422"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 40) rotate(31) scale(520 280)">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="76" y1="244" x2="578" y2="244" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#E2E8F0" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="20" fill="url(#glow)"/>
  <rect width="1200" height="300" rx="20" fill="url(#grid)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="298.5" rx="19.25" stroke="#94A3B8" stroke-opacity="0.16" stroke-width="1.5"/>

  <g transform="translate(76 62)">
    <circle cx="7" cy="7" r="7" fill="#22C55E"/>
    <text x="26" y="12" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="2">SOFTWARE DEVELOPER</text>
  </g>

  <text x="76" y="145" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="800">Mert Efe Kurt</text>
  <text x="79" y="190" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="500">
    Reliable tooling for AI systems
  </text>
  <rect x="78" y="230" width="500" height="4" rx="2" fill="url(#accent)"/>

  <g filter="url(#shadow)">
    <rect x="704" y="48" width="416" height="204" rx="18" fill="#0A1220" stroke="#94A3B8" stroke-opacity="0.18"/>
    <rect x="704" y="48" width="416" height="42" rx="18" fill="#111C2D"/>
    <path d="M704 90H1120" stroke="#94A3B8" stroke-opacity="0.12"/>
    <circle cx="730" cy="69" r="5" fill="#FB7185"/>
    <circle cx="749" cy="69" r="5" fill="#FBBF24"/>
    <circle cx="768" cy="69" r="5" fill="#4ADE80"/>
    <text x="796" y="75" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="13">quality-gate.yml</text>

    <g font-family="Arial, Helvetica, sans-serif" font-size="16">
      <text x="738" y="126" fill="#4ADE80">✓</text>
      <text x="770" y="126" fill="#CBD5E1">evaluation</text>
      <text x="1044" y="126" fill="#64748B" text-anchor="end">pass</text>

      <text x="738" y="162" fill="#4ADE80">✓</text>
      <text x="770" y="162" fill="#CBD5E1">agent traces</text>
      <text x="1044" y="162" fill="#64748B" text-anchor="end">clean</text>

      <text x="738" y="198" fill="#4ADE80">✓</text>
      <text x="770" y="198" fill="#CBD5E1">citations</text>
      <text x="1044" y="198" fill="#64748B" text-anchor="end">grounded</text>
    </g>

    <rect x="738" y="220" width="350" height="1" fill="#94A3B8" fill-opacity="0.1"/>
    <text x="738" y="239" fill="#38BDF8" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">DETERMINISTIC · LOCAL · CI-READY</text>
  </g>
</svg>
