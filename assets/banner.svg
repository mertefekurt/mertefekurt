    <text x="18" y="21" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">Python</text>
    <rect x="104" y="0" width="124" height="32" rx="16" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.3"/>
    <text x="121" y="21" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">Automation</text>
    <rect x="240" y="0" width="116" height="32" rx="16" fill="#0B1220" stroke="#22C55E" stroke-opacity="0.3"/>
    <text x="258" y="21" fill="#DCFCE7" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">FastAPI</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="686" y="58" width="414" height="244" rx="28" fill="url(#card)" stroke="url(#cardEdge)" stroke-width="1.2"/>
    <path d="M730 246C790 196 844 194 904 238C956 276 1004 264 1060 212" stroke="#38BDF8" stroke-opacity="0.18" stroke-width="2"/>

    <text x="730" y="88" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.3">RELIABLE TOOLING</text>

    <g transform="translate(726 108)">
      <rect x="0" y="0" width="132" height="50" rx="17" fill="#0B1220" stroke="#38BDF8" stroke-opacity="0.3"/>
      <text x="34" y="31" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Build</text>
    </g>

    <g transform="translate(898 108)">
      <rect x="0" y="0" width="132" height="50" rx="17" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.3"/>
      <text x="31" y="31" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Check</text>
    </g>

    <g transform="translate(812 202)">
      <rect x="0" y="0" width="132" height="50" rx="17" fill="#0B1220" stroke="#22C55E" stroke-opacity="0.3"/>
      <text x="49" y="31" fill="#DCFCE7" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Ship</text>
    </g>

    <path d="M858 133H898" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M963 158L920 202" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M834 202L792 158" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>

    <circle cx="878" cy="133" r="5" fill="#38BDF8"/>
    <circle cx="940" cy="182" r="5" fill="#60A5FA"/>
    <circle cx="812" cy="182" r="5" fill="#22C55E"/>

    <text x="730" y="276" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">automation -> validation -> backend</text>
  </g>
